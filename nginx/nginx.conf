# =====================================================
# paper-translate — Nginx 反向代理配置
# =====================================================
# 角色：
#   1. SSL 终止（443）
#   2. HTTP → HTTPS 强制跳转（80）
#   3. 反向代理 /api/* → api:8000
#   4. 反向代理 /api/v1/ws/* → api:8000（WebSocket）
#   5. 静态资源 / → frontend:80
#
# 占位说明：
#   - SSL 证书用自签名 / Let's Encrypt 占位
#   - 生产环境请将证书放到 ./certs/ 目录
# =====================================================

user                 nginx;
worker_processes     auto;
worker_rlimit_nofile 65535;
pid                  /var/run/nginx.pid;

events {
    worker_connections 4096;
    use                epoll;
    multi_accept       on;
}

http {
    # =====================
    # 基础
    # =====================
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    server_tokens off;

    keepalive_timeout      65;
    keepalive_requests     1000;
    types_hash_max_size    2048;
    client_max_body_size   100m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 8 16k;

    # =====================
    # Gzip
    # =====================
    gzip                on;
    gzip_vary           on;
    gzip_min_length     1024;
    gzip_comp_level     6;
    gzip_proxied        any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        application/rss+xml
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # =====================
    # 上游
    # =====================
    upstream api_backend {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:80 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # =====================
    # HTTP（80）→ HTTPS（443）跳转
    # =====================
    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Let's Encrypt 验证用
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其他请求全部跳转 HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # =====================
    # HTTPS（443）— 主服务
    # =====================
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name _;

        # =====================
        # SSL 证书占位（生产环境替换）
        # =====================
        # 自签名证书生成：
        #   mkdir -p ./certs
        #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #       -keyout ./certs/privkey.pem \
        #       -out ./certs/fullchain.pem \
        #       -subj "/CN=localhost"
        # Let's Encrypt：
        #   certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
        #   cp /etc/letsencrypt/live/yourdomain.com/fullchain.pem ./certs/
        #   cp /etc/letsencrypt/live/yourdomain.com/privkey.pem ./certs/
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols           TLSv1.2 TLSv1.3;
        ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache       shared:SSL:10m;
        ssl_session_timeout     1d;
        ssl_session_tickets     off;

        # HSTS（生产环境启用）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options          "SAMEORIGIN"      always;
        add_header X-Content-Type-Options   "nosniff"         always;
        add_header X-XSS-Protection         "1; mode=block"   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # =====================
        # 通用代理参数
        # =====================
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 16k;

        # =====================
        # 健康检查端点
        # =====================
        location = /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # =====================
        # API 反向代理（HTTP）
        # =====================
        location /api/ {
            proxy_pass http://api_backend;
        }

        # =====================
        # WebSocket 反向代理
        # =====================
        location /api/v1/ws/ {
            proxy_pass          http://api_backend;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade           $http_upgrade;
            proxy_set_header    Connection        "upgrade";
            proxy_set_header    Host              $host;
            proxy_set_header    X-Real-IP         $remote_addr;
            proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;

            # WebSocket 长连接超时
            proxy_connect_timeout 7d;
            proxy_send_timeout    7d;
            proxy_read_timeout    7d;
        }

        # =====================
        # 静态资源（前端 SPA）— fallback
        # =====================
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;

            # 静态资源缓存
            location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend_backend;
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }

        # =====================
        # 禁止访问敏感路径
        # =====================
        location ~ /\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* (?:^|/)\.(?!well-known) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
name: paper-translate-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &restart-policy
  restart: unless-stopped

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: paper-translate/frontend:${APP_VERSION:-latest}
    container_name: paper-translate-frontend
    <<: *restart-policy
    expose:
      - "80"
    networks:
      - appnet
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: paper-translate/backend:${APP_VERSION:-latest}
    container_name: paper-translate-api
    <<: *restart-policy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - downloads:/app/downloads
    networks:
      - appnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
        reservations:
          memory: 1g
          cpus: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: paper-translate/worker:${APP_VERSION:-latest}
    container_name: paper-translate-worker
    <<: *restart-policy
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    volumes:
      - uploads:/app/uploads
      - downloads:/app/downloads
      - worker_tmp:/tmp/pdf-work
    networks:
      - appnet
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4"
        reservations:
          memory: 2g
          cpus: "2"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q dramatiq || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: paper-translate-redis
    <<: *restart-policy
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    networks:
      - appnet
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    container_name: paper-translate-postgres
    <<: *restart-policy
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups:rw
    networks:
      - appnet
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2"
        reservations:
          memory: 512m
          cpus: "1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: paper-translate-nginx
    <<: *restart-policy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - appnet
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "1"
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: paper-translate-prometheus
    <<: *restart-policy
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - appnet
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1"
    depends_on:
      - node_exporter
    profiles:
      - monitoring

  node_exporter:
    image: prom/node-exporter:v1.8.1
    container_name: paper-translate-node-exporter
    <<: *restart-policy
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - appnet
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    profiles:
      - monitoring

networks:
  appnet:
    name: paper-translate-prod-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    name: paper-translate-prod-postgres-data
  redis_data:
    name: paper-translate-prod-redis-data
  uploads:
    name: paper-translate-prod-uploads
  downloads:
    name: paper-translate-prod-downloads
  nginx_logs:
    name: paper-translate-prod-nginx-logs
  worker_tmp:
    name: paper-translate-prod-worker-tmp
  prometheus_data:
    name: paper-translate-prod-prometheus-data

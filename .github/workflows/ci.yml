name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck (Backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -r backend/requirements.txt
      - name: Run ruff
        run: ruff check backend/
      - name: Run mypy
        run: mypy backend/

  frontend-check:
    name: Lint & TypeCheck (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm --prefix frontend ci
      - name: Run typecheck
        run: npm --prefix frontend run typecheck
      - name: Run lint
        run: npm --prefix frontend run lint

  test:
    name: Run Tests
    needs: [lint-and-typecheck, frontend-check]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paper
          POSTGRES_PASSWORD: paper
          POSTGRES_DB: paper_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paper -d paper_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://paper:paper@localhost:5432/paper_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run pytest
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short -x
      - name: Install Playwright
        run: |
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: |
          npx playwright test --project=chromium
